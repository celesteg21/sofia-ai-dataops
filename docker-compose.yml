services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Uncomment or run with --profile ollama to use a local LLM.
  # Requires LLM_BACKEND=ollama in .env and pulling a model first:
  #   docker compose --profile ollama run ollama pull llama3
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  ollama_data:
